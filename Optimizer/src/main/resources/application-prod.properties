# Application Configuration for Production
spring.application.name=cloud-cost-optimizer

# Server
server.port=8080
server.compression.enabled=true
server.compression.mime-types=application/json,application/xml,text/html,text/xml,text/plain

# Database (PostgreSQL)
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/cloud_cost}
spring.datasource.username=${DATABASE_USERNAME:postgres}
spring.datasource.password=${DATABASE_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.hikari.maximum-pool-size=${DB_POOL_SIZE:20}
spring.datasource.hikari.minimum-idle=${DB_POOL_MIN:5}
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# JPA/Hibernate
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.jdbc.batch_size=50
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true

# Redis
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.password=${REDIS_PASSWORD:}
spring.data.redis.timeout=2000ms
spring.data.redis.lettuce.pool.max-active=20
spring.data.redis.lettuce.pool.max-idle=10
spring.data.redis.lettuce.pool.min-idle=5
spring.cache.type=redis
spring.cache.redis.time-to-live=3600000
spring.cache.redis.cache-null-values=false

# AWS Configuration
aws.default.region=${AWS_DEFAULT_REGION:us-east-1}
aws.scanner.batch.size=${AWS_SCANNER_BATCH_SIZE:100}
aws.scanner.max.attempts=${AWS_SCANNER_MAX_ATTEMPTS:3}
aws.scanner.retry.delay=${AWS_SCANNER_RETRY_DELAY:1000}
aws.credentials.access-key=${AWS_ACCESS_KEY_ID:}
aws.credentials.secret-key=${AWS_SECRET_ACCESS_KEY:}

# Scheduling
spring.scheduling.enabled=true

# Actuator / Monitoring
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=always
management.endpoint.health.probes.enabled=true
management.health.livenessState.enabled=true
management.health.readinessState.enabled=true
management.metrics.export.prometheus.enabled=true
management.metrics.tags.application=cloud-cost-optimizer

# Logging
logging.level.com.cloudcost=${LOG_LEVEL:INFO}
logging.level.org.springframework.web=WARN
logging.level.org.hibernate.SQL=WARN
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n
logging.file.name=logs/cloud-cost-optimizer.log

# Security
jwt.secret=${JWT_SECRET:}
jwt.token.validity=${JWT_TOKEN_VALIDITY:86400000}
jwt.refresh.token.validity=${JWT_REFRESH_TOKEN_VALIDITY:604800000}

# Cost Optimization
cost.optimizer.scan.enabled=true
cost.optimizer.recommendation.enabled=true
cost.optimizer.notification.enabled=true